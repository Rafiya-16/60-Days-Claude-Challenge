<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prior Authorization — An Interactive Story</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f0f4f8;
    margin: 0;
  }

  /* Scrollbar */
  #chat-feed::-webkit-scrollbar { width: 4px; }
  #chat-feed::-webkit-scrollbar-track { background: transparent; }
  #chat-feed::-webkit-scrollbar-thumb { background: #c7d2e0; border-radius: 2px; }

  /* Chat bubble animations */
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-18px) translateY(6px); }
    to { opacity: 1; transform: translateX(0) translateY(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(18px) translateY(6px); }
    to { opacity: 1; transform: translateX(0) translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseChoice {
    0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
    50% { box-shadow: 0 0 0 4px rgba(59,130,246,0.18); }
  }
  @keyframes progressFill {
    from { width: 0%; }
    to { width: var(--target-w); }
  }

  .bubble-left { animation: slideInLeft 0.38s cubic-bezier(.22,.68,0,1.2) both; }
  .bubble-right { animation: slideInRight 0.38s cubic-bezier(.22,.68,0,1.2) both; }
  .narrator-fade { animation: fadeInUp 0.45s ease both; }

  .choice-btn {
    animation: fadeInUp 0.35s ease both;
    transition: all 0.18s ease;
    cursor: pointer;
    border: 1.5px solid #cbd5e1;
    background: #fff;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 13px;
    color: #1e3a5f;
    font-weight: 500;
    text-align: left;
    width: 100%;
  }
  .choice-btn:hover {
    border-color: #3b82f6;
    background: #eff6ff;
    transform: translateY(-1px);
  }
  .choice-btn.selected {
    border-color: #2563eb;
    background: #dbeafe;
    color: #1d4ed8;
    animation: pulseChoice 0.4s ease;
  }
  .choice-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  /* Progress bar fill */
  .progress-fill {
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }

  /* Typing indicator */
  @keyframes typingDot {
    0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }
  .typing-dot { animation: typingDot 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* Cite box */
  .cite-box {
    border-left: 3px solid #3b82f6;
    background: #eff6ff;
    border-radius: 0 8px 8px 0;
    padding: 8px 12px;
    font-size: 11.5px;
    color: #1e40af;
    font-style: italic;
    margin-top: 8px;
    line-height: 1.5;
  }

  /* Info card inside bubble */
  .info-card {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.6;
  }
  .info-card-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    padding: 5px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .info-card-row:last-child { border-bottom: none; }

  /* Scene header */
  .scene-divider {
    animation: fadeInUp 0.4s ease both;
    text-align: center;
    margin: 28px 0 18px;
    position: relative;
  }
  .scene-divider::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 1px;
    background: linear-gradient(to right, transparent, #c7d2e0, transparent);
  }
  .scene-divider-inner {
    display: inline-block;
    position: relative;
    background: #f0f4f8;
    padding: 0 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #64748b;
  }

  /* Outcome banner */
  .outcome-banner {
    animation: fadeInUp 0.5s ease both;
    text-align: center;
    padding: 16px 20px;
    border-radius: 14px;
    margin: 12px 0;
    font-family: 'Lora', serif;
    font-size: 15px;
  }

  /* Lora for narrator */
  .narrator-text {
    font-family: 'Lora', serif;
    font-style: italic;
  }

  /* Stat pill */
  .stat-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #1e40af;
    color: #fff;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    margin: 2px;
  }

  /* Takeaway card */
  .takeaway-card {
    background: linear-gradient(135deg, #1e3a5f 0%, #1e40af 100%);
    color: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    margin-top: 8px;
    font-size: 12.5px;
    line-height: 1.7;
    animation: fadeInUp 0.5s ease both;
  }
  .takeaway-card h4 {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    opacity: 0.9;
  }
  .takeaway-item {
    display: flex;
    gap: 7px;
    align-items: flex-start;
    margin-bottom: 5px;
  }
  .takeaway-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #60a5fa;
    margin-top: 6px;
    flex-shrink: 0;
  }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-blue-50">

<!-- TOP BAR -->
<div class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
  <div class="max-w-2xl mx-auto px-4 py-3">
    <div class="flex items-center justify-between mb-2">
      <div>
        <div class="text-xs font-bold text-blue-800 uppercase tracking-widest">Healthcare Education Series</div>
        <div class="text-base font-bold text-slate-800 leading-tight">Prior Authorization — An Interactive Story</div>
      </div>
      <div class="text-right">
        <div class="text-xs text-slate-500" id="scene-label">Scene 1 of 8</div>
        <div class="text-xs font-semibold text-blue-700" id="scene-name">Doctor Visit</div>
      </div>
    </div>
    <!-- Progress bar -->
    <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
      <div id="progress-bar" class="progress-fill h-full bg-gradient-to-r from-blue-500 to-blue-700 rounded-full" style="width: 0%"></div>
    </div>
  </div>
</div>

<!-- CHARACTERS LEGEND -->
<div class="max-w-2xl mx-auto px-4 pt-4 pb-2">
  <div class="flex gap-3 justify-center">
    <div class="flex items-center gap-1.5 bg-white rounded-full px-3 py-1.5 shadow-sm border border-slate-200 text-xs font-medium text-slate-600">
      <span class="text-base">👦</span> Rahul <span class="text-slate-300">·</span> <span class="text-blue-600">Patient</span>
    </div>
    <div class="flex items-center gap-1.5 bg-white rounded-full px-3 py-1.5 shadow-sm border border-slate-200 text-xs font-medium text-slate-600">
      <span class="text-base">👧</span> Priya <span class="text-slate-300">·</span> <span class="text-emerald-600">Healthcare Ops</span>
    </div>
    <div class="flex items-center gap-1.5 bg-white rounded-full px-3 py-1.5 shadow-sm border border-slate-200 text-xs font-medium text-slate-600">
      <span class="text-slate-400 italic text-xs">italic</span> <span class="text-slate-300">·</span> <span class="text-slate-500">Narrator</span>
    </div>
  </div>
</div>

<!-- CHAT FEED -->
<div class="max-w-2xl mx-auto px-4 pb-8">
  <div id="chat-feed" class="flex flex-col gap-1 min-h-32"></div>

  <!-- Choices area -->
  <div id="choices-area" class="mt-6 flex flex-col gap-2.5"></div>

  <!-- End screen -->
  <div id="end-screen" class="hidden text-center mt-8 pb-8">
    <div class="text-3xl mb-3">🎓</div>
    <div class="text-lg font-bold text-slate-800 mb-1">Story Complete</div>
    <div class="text-sm text-slate-500 mb-5">You've navigated a full prior authorization journey.</div>
    <button onclick="restartStory()" class="bg-blue-700 hover:bg-blue-800 text-white font-semibold text-sm px-6 py-3 rounded-xl transition-all hover:-translate-y-0.5">
      ↩ Read Again
    </button>
  </div>
</div>

<script>
// ============================================================
//  STORY ENGINE
// ============================================================

// Global state
let currentScene = 0;
let choiceMade = null;
let typingEl = null;

// DOM references
const feed = document.getElementById('chat-feed');
const choicesArea = document.getElementById('choices-area');
const progressBar = document.getElementById('progress-bar');
const sceneLabel = document.getElementById('scene-label');
const sceneName = document.getElementById('scene-name');
const endScreen = document.getElementById('end-screen');

// ============================================================
//  PRIMITIVE BUILDERS — never use innerHTML on feed
// ============================================================

function makeBubble(side, emoji, name, colorClass, bgClass, borderClass) {
  /* Creates a full bubble row and returns the text container */
  const row = document.createElement('div');
  row.className = `flex items-end gap-2 mb-1 ${side === 'right' ? 'flex-row-reverse' : ''}`;

  // Avatar
  const av = document.createElement('div');
  av.className = 'w-8 h-8 rounded-full flex items-center justify-center text-base flex-shrink-0 shadow-sm border border-white';
  av.style.background = side === 'left' ? '#dbeafe' : '#d1fae5';
  av.textContent = emoji;

  // Bubble wrapper
  const bwrap = document.createElement('div');
  bwrap.className = `flex flex-col ${side === 'right' ? 'items-end' : 'items-start'} max-w-xs sm:max-w-sm`;

  // Name tag
  const nameTag = document.createElement('div');
  nameTag.className = `text-xs font-semibold mb-1 ${colorClass}`;
  nameTag.textContent = name;

  // Bubble
  const bubble = document.createElement('div');
  bubble.className = `${bgClass} ${borderClass} border rounded-2xl px-4 py-2.5 text-sm text-slate-800 leading-relaxed shadow-sm ${side === 'left' ? 'bubble-left rounded-bl-sm' : 'bubble-right rounded-br-sm'}`;

  bwrap.appendChild(nameTag);
  bwrap.appendChild(bubble);

  if (side === 'left') {
    row.appendChild(av);
    row.appendChild(bwrap);
  } else {
    row.appendChild(bwrap);
    row.appendChild(av);
  }

  feed.appendChild(row);
  return bubble;
}

function addText(bubbleEl, text) {
  const p = document.createElement('p');
  p.textContent = text;
  bubbleEl.appendChild(p);
}

function addBold(bubbleEl, label, value) {
  const p = document.createElement('p');
  p.style.marginTop = '4px';
  const b = document.createElement('span');
  b.style.fontWeight = '600';
  b.textContent = label + ' ';
  const v = document.createElement('span');
  v.textContent = value;
  p.appendChild(b);
  p.appendChild(v);
  bubbleEl.appendChild(p);
}

function addParagraph(bubbleEl, text) {
  const p = document.createElement('p');
  p.textContent = text;
  p.style.marginTop = '6px';
  bubbleEl.appendChild(p);
}

function addCite(bubbleEl, text) {
  const div = document.createElement('div');
  div.className = 'cite-box';
  div.textContent = '📎 ' + text;
  bubbleEl.appendChild(div);
}

function addInfoCard(bubbleEl, rows) {
  const card = document.createElement('div');
  card.className = 'info-card';
  rows.forEach(([icon, label, val]) => {
    const row = document.createElement('div');
    row.className = 'info-card-row';
    const ic = document.createElement('span');
    ic.textContent = icon;
    ic.style.flexShrink = '0';
    ic.style.fontSize = '14px';
    const txt = document.createElement('div');
    const lb = document.createElement('span');
    lb.style.fontWeight = '600';
    lb.style.color = '#1e3a5f';
    lb.textContent = label + ': ';
    const vl = document.createElement('span');
    vl.style.color = '#475569';
    vl.textContent = val;
    txt.appendChild(lb);
    txt.appendChild(vl);
    row.appendChild(ic);
    row.appendChild(txt);
    card.appendChild(row);
  });
  bubbleEl.appendChild(card);
}

function addStatPills(bubbleEl, pills) {
  const wrap = document.createElement('div');
  wrap.style.marginTop = '8px';
  pills.forEach(([icon, text]) => {
    const pill = document.createElement('span');
    pill.className = 'stat-pill';
    pill.textContent = icon + ' ' + text;
    wrap.appendChild(pill);
  });
  bubbleEl.appendChild(wrap);
}

// Rahul bubble (left)
function rahul(messages, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const b = makeBubble('left', '👦', 'Rahul — Patient', 'text-blue-700', 'bg-blue-50', 'border-blue-200');
      if (Array.isArray(messages)) {
        messages.forEach((m, i) => {
          if (i === 0) addText(b, m);
          else addParagraph(b, m);
        });
      } else {
        addText(b, messages);
      }
      scrollFeed();
      resolve(b);
    }, delay);
  });
}

// Priya bubble (right)
function priya(messages, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const b = makeBubble('right', '👧', 'Priya — Healthcare Ops', 'text-emerald-700', 'bg-emerald-50', 'border-emerald-200');
      if (Array.isArray(messages)) {
        messages.forEach((m, i) => {
          if (i === 0) addText(b, m);
          else addParagraph(b, m);
        });
      } else {
        addText(b, messages);
      }
      scrollFeed();
      resolve(b);
    }, delay);
  });
}

// Narrator (centered, italic, no bubble)
function narrator(text, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'narrator-fade text-center my-3 px-6';
      const em = document.createElement('em');
      em.className = 'narrator-text text-slate-500 text-sm leading-relaxed';
      em.textContent = text;
      div.appendChild(em);
      feed.appendChild(div);
      scrollFeed();
      resolve();
    }, delay);
  });
}

// Scene header divider
function sceneHeader(num, title, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'scene-divider';
      const inner = document.createElement('div');
      inner.className = 'scene-divider-inner';
      inner.textContent = `Scene ${num} · ${title}`;
      div.appendChild(inner);
      feed.appendChild(div);
      scrollFeed();
      resolve();
    }, delay);
  });
}

// Outcome banner
function outcomeBanner(icon, text, type, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const colorMap = {
        success: { bg: '#f0fdf4', border: '#86efac', text: '#14532d' },
        danger:  { bg: '#fef2f2', border: '#fca5a5', text: '#7f1d1d' },
        warning: { bg: '#fffbeb', border: '#fde68a', text: '#78350f' },
        info:    { bg: '#eff6ff', border: '#93c5fd', text: '#1e3a5f' },
      };
      const c = colorMap[type] || colorMap.info;
      const div = document.createElement('div');
      div.className = 'outcome-banner mx-4';
      div.style.background = c.bg;
      div.style.border = `1.5px solid ${c.border}`;
      div.style.color = c.text;
      div.textContent = icon + '  ' + text;
      feed.appendChild(div);
      scrollFeed();
      resolve();
    }, delay);
  });
}

// Takeaway card
function takeawayCard(title, items, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const card = document.createElement('div');
      card.className = 'takeaway-card';
      const h4 = document.createElement('h4');
      h4.textContent = title;
      card.appendChild(h4);
      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'takeaway-item';
        const dot = document.createElement('div');
        dot.className = 'takeaway-dot';
        const txt = document.createElement('div');
        txt.textContent = item;
        row.appendChild(dot);
        row.appendChild(txt);
        card.appendChild(row);
      });
      feed.appendChild(card);
      scrollFeed();
      resolve();
    }, delay);
  });
}

// Typing indicator (adds temporarily)
function showTyping(side, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const row = document.createElement('div');
      row.className = `flex items-end gap-2 mb-1 ${side === 'right' ? 'flex-row-reverse' : ''}`;
      row.id = 'typing-indicator';
      const av = document.createElement('div');
      av.className = 'w-8 h-8 rounded-full flex items-center justify-center text-base flex-shrink-0';
      av.style.background = side === 'left' ? '#dbeafe' : '#d1fae5';
      av.textContent = side === 'left' ? '👦' : '👧';
      const b = document.createElement('div');
      b.className = `bg-slate-100 border border-slate-200 rounded-2xl px-4 py-3 flex gap-1.5 items-center`;
      [1,2,3].forEach(i => {
        const dot = document.createElement('div');
        dot.className = 'typing-dot w-2 h-2 rounded-full bg-slate-400';
        b.appendChild(dot);
      });
      if (side === 'left') { row.appendChild(av); row.appendChild(b); }
      else { row.appendChild(b); row.appendChild(av); }
      feed.appendChild(row);
      scrollFeed();
      resolve();
    }, delay);
  });
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// Choices presenter
function showChoices(choices, onSelect) {
  choicesArea.innerHTML = '';
  const label = document.createElement('div');
  label.className = 'text-center text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2';
  label.textContent = 'What would you like to do?';
  choicesArea.appendChild(label);

  choices.forEach((choice, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice.emoji + '  ' + choice.label;
    btn.style.animationDelay = (idx * 0.08) + 's';
    btn.addEventListener('click', () => {
      // Disable all buttons
      choicesArea.querySelectorAll('button').forEach(b => {
        b.disabled = true;
        b.style.opacity = '0.4';
      });
      btn.classList.add('selected');
      btn.style.opacity = '1';
      choiceMade = idx;
      setTimeout(() => {
        choicesArea.innerHTML = '';
        onSelect(idx);
      }, 500);
    });
    choicesArea.appendChild(btn);
  });
}

function clearChoices() {
  choicesArea.innerHTML = '';
}

function scrollFeed() {
  setTimeout(() => {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }, 60);
}

function updateProgress(scene) {
  const pct = Math.round((scene / 8) * 100);
  progressBar.style.width = pct + '%';
  sceneLabel.textContent = `Scene ${scene} of 8`;
  const names = ['', 'Doctor Visit', 'Insurance Roadblock', 'What is PA?', 'Insurance Review', 'Denial', 'Appeal', 'Approval', 'Takeaways'];
  sceneName.textContent = names[scene] || '';
}

// Delay helper
const wait = ms => new Promise(r => setTimeout(r, ms));

// ============================================================
//  SCENES
// ============================================================

async function scene1() {
  updateProgress(1);
  await sceneHeader(1, 'Doctor Visit');
  await narrator('Rahul is 34 years old, a software developer in Mumbai. For months, his joints have been aching — especially in the morning. Today, he finally visits City Medical Center.', 0);
  await wait(600);

  await showTyping('left', 200);
  await wait(1000);
  removeTyping();
  let b = await rahul(['Dr. Patel, my fingers feel stiff every morning. Sometimes it takes two hours before I can type normally.'], 0);

  await wait(900);
  await narrator('Dr. Patel examines Rahul carefully, orders blood tests, and reviews X-rays.', 400);
  await wait(600);

  await narrator('Results come back. Dr. Patel has a diagnosis.', 400);
  await wait(400);

  const diagBubble = document.createElement('div');
  diagBubble.className = 'narrator-fade mx-4';
  const box = document.createElement('div');
  box.style.cssText = 'background:#f8fafc;border:1.5px solid #cbd5e1;border-radius:14px;padding:14px 16px;font-size:13px;color:#1e3a5f;';
  const title = document.createElement('div');
  title.style.cssText = 'font-weight:700;font-size:14px;color:#1e40af;margin-bottom:8px;';
  title.textContent = '🩺 Dr. Patel\'s Diagnosis';
  const rows = [
    ['Condition', 'Rheumatoid Arthritis (RA) — moderate to severe'],
    ['ICD-10 Code', 'M05.79 — Seropositive RA, multiple joints'],
    ['Prescribed', 'Humira (Adalimumab) — a biologic DMARD'],
    ['Why Humira?', 'RA is immune-mediated; biologics target the inflammation pathway at its source'],
  ];
  box.appendChild(title);
  rows.forEach(([l, v]) => {
    const r = document.createElement('div');
    r.style.cssText = 'display:flex;gap:8px;padding:5px 0;border-top:1px solid #e2e8f0;font-size:12px;';
    const lb = document.createElement('span');
    lb.style.cssText = 'font-weight:600;color:#374151;min-width:90px;flex-shrink:0;';
    lb.textContent = l + ':';
    const vl = document.createElement('span');
    vl.style.color = '#475569';
    vl.textContent = v;
    r.appendChild(lb); r.appendChild(vl);
    box.appendChild(r);
  });
  diagBubble.appendChild(box);
  feed.appendChild(diagBubble);
  scrollFeed();

  await wait(900);
  await showTyping('left', 200);
  await wait(1000);
  removeTyping();
  b = await rahul(["Humira? I've heard of that. Can I just pick it up at the pharmacy?"], 0);

  await wait(700);
  await narrator('Dr. Patel pauses. There\'s a step that must happen first.', 400);
  await wait(300);

  showChoices([
    { emoji: '🤔', label: 'Ask why you can\'t just pick it up at the pharmacy' },
    { emoji: '📋', label: 'Ask what "next steps" look like before you get the medication' }
  ], async (idx) => {
    if (idx === 0) {
      await showTyping('left', 200);
      await wait(800);
      removeTyping();
      await rahul(["Wait — why can't the pharmacy just dispense it? Isn't that how prescriptions work?"], 0);
      await wait(600);
      await narrator('Dr. Patel explains that Humira is a specialty biologic — it costs over ₹3–4 lakh per month. Insurance companies require special approval before they\'ll cover it.', 400);
    } else {
      await showTyping('left', 200);
      await wait(800);
      removeTyping();

  mt.style.cssText = 'font-weight:700;font-size:13px;color:#93c5fd;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;font-size:11px;';
  mt.textContent = '🏥 System-Level PA Metrics Dashboard';
  metricsDiv.appendChild(mt);
  const metricsGrid = document.createElement('div');
  metricsGrid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:8px;';
  const metrics = [
    { label: 'Denial Rate', value: '~18%', sub: 'Percent of PAs denied on first submission', color: '#fca5a5' },
    { label: 'Appeal Rate', value: '~42%', sub: 'Denials that go to formal appeal', color: '#fcd34d' },
    { label: 'Overturn Rate', value: '~55%', sub: 'Appeals that succeed and reverse denial', color: '#86efac' },
    { label: 'Resolution Time', value: '11 days', sub: 'Avg. end-to-end PA cycle time', color: '#93c5fd' },
  ];
  metrics.forEach(m => {
    const card = document.createElement('div');
    card.style.cssText = 'background:rgba(255,255,255,0.08);border-radius:10px;padding:10px;';
    const val = document.createElement('div');
    val.style.cssText = `font-size:22px;font-weight:800;color:${m.color};`;
    val.textContent = m.value;
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:11px;font-weight:600;color:#e2e8f0;margin-top:2px;';
    lbl.textContent = m.label;
    const sub = document.createElement('div');
    sub.style.cssText = 'font-size:10px;color:#94a3b8;margin-top:2px;line-height:1.4;';
    sub.textContent = m.sub;
    card.appendChild(val); card.appendChild(lbl); card.appendChild(sub);
    metricsGrid.appendChild(card);
  });
  metricsDiv.appendChild(metricsGrid);

  const note = document.createElement('div');
  note.style.cssText = 'margin-top:10px;font-size:11px;color:#93c5fd;font-style:italic;border-top:1px solid rgba(255,255,255,0.1);padding-top:8px;';
  note.textContent = 'Source: CAQH Index 2023, AMA PA Physician Survey 2023. StarCare Health used as illustrative example throughout.';
  metricsDiv.appendChild(note);
  feed.appendChild(metricsDiv);
  scrollFeed();

  await wait(900);
  await takeawayCard('🏥 System Perspective — How Health Systems Track PA', [
    'Denial rate: % of PAs denied first time. High rates signal documentation gaps or payer policy misalignment.',
    'Appeal rate: % of denials challenged. Low appeal rates mean revenue is being left on the table.',
    'Overturn rate: % of successful appeals. A strong overturn rate validates appeal effort — and means denials were often wrongful.',
    'Resolution time: Days from PA request to final decision. Longer cycles mean delayed care and held revenue.',
    'Staff hours: Administrative burden per PA. A key target for automation via AI-assisted PA tools.',
  ]);

  await wait(900);
  let pb2 = await priya(["The PA process is getting attention from regulators too. CMS introduced rules in 2024 requiring Medicare Advantage plans to make PA decisions faster and share denial data publicly."], 700);
  addCite(pb2, "CMS 2024 Prior Authorization Rule: Requires payers to respond to standard PA requests within 7 days and urgent requests within 72 hours — and to publish PA denial rates publicly.");

  await wait(900);
  showChoices([
    { emoji: '🔄', label: 'Read the story again from the beginning' },
    { emoji: '🎓', label: 'I\'m done — I understand Prior Authorization now' }
  ], async (idx) => {
    if (idx === 0) {
      restartStory();
    } else {
      await showTyping('left', 200);
      await wait(800);
      removeTyping();
      await rahul(["Thank you, Priya. I had no idea how much was happening behind the scenes. The system is complicated — but at least now I know how to navigate it."], 0);
      await wait(700);
      let pbf = await priya(["And that's exactly why education matters. Most patients only encounter this when they're already unwell and stressed. Knowing your rights — appeal, P2P, IRO — changes the outcome."], 700);
      addParagraph(pbf, "The PA system exists for a reason, but it has real friction costs. The more patients and providers understand it, the better outcomes we get for everyone. Good luck with your treatment, Rahul.");
      await wait(700);
      await narrator('The End. Rahul starts Humira. His RA stabilizes over the following months. The process was slow — but navigable.', 400);
      await wait(600);
      endScreen.classList.remove('hidden');
      scrollFeed();
    }
  });
}

// ============================================================
//  RESTART
// ============================================================
function restartStory() {
  // Clear everything
  while (feed.firstChild) feed.removeChild(feed.firstChild);
  choicesArea.innerHTML = '';
  endScreen.classList.add('hidden');
  currentScene = 0;
  choiceMade = null;
  progressBar.style.width = '0%';
  sceneLabel.textContent = 'Scene 1 of 8';
  sceneName.textContent = 'Doctor Visit';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => scene1(), 400);
}

// ============================================================
//  BOOT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => scene1(), 500);
});
</script>
</body>
</html>
