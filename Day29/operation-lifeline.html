<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operation Lifeline: Supply Chain Crisis Lab</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --surface3: #1e2d45;
    --border: #1e3a5f;
    --border2: #2a4a6e;
    --text: #e2e8f0;
    --muted: #7a9bbf;
    --dim: #4a6a8a;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --amber: #f59e0b;
    --emerald: #10b981;
    --rose: #f43f5e;
    --violet: #8b5cf6;
    --cyan: #06b6d4;
    --orange: #f97316;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  #root { min-height: 100vh; }

  /* ─── GRID BACKGROUND ──────────────────────────── */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ─── LAYOUT ────────────────────────────────────── */
  .screen {
    position: relative; z-index: 1;
    min-height: 100vh;
    padding: 24px 16px;
    max-width: 900px;
    margin: 0 auto;
    display: flex; flex-direction: column;
  }

  .screen-center {
    align-items: center; justify-content: center; text-align: center;
  }

  /* ─── CARDS ─────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    transition: border-color .2s, box-shadow .2s;
  }

  .card:hover { border-color: var(--border2); }

  .card-glow {
    box-shadow: 0 0 0 1px var(--accent), 0 4px 24px rgba(59,130,246,0.15);
    border-color: var(--accent);
  }

  .card-amber { border-color: var(--amber); box-shadow: 0 4px 24px rgba(245,158,11,0.1); }
  .card-rose { border-color: var(--rose); box-shadow: 0 4px 24px rgba(244,63,94,0.1); }
  .card-emerald { border-color: var(--emerald); box-shadow: 0 4px 24px rgba(16,185,129,0.1); }
  .card-violet { border-color: var(--violet); box-shadow: 0 4px 24px rgba(139,92,246,0.1); }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
  }

  /* ─── TYPOGRAPHY ─────────────────────────────────── */
  .display {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    line-height: 1.1;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .value-large {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
  }

  /* ─── BUTTONS ────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all .18s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.4); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-amber {
    background: var(--amber); color: #0b0f1a;
  }
  .btn-amber:hover { background: #fbbf24; transform: translateY(-1px); }

  .btn-emerald {
    background: var(--emerald); color: #0b0f1a;
  }
  .btn-emerald:hover { background: #34d399; transform: translateY(-1px); }

  .btn-rose { background: var(--rose); color: #fff; }
  .btn-rose:hover { background: #fb7185; transform: translateY(-1px); }

  .btn-large { padding: 16px 40px; font-size: 16px; border-radius: 12px; }
  .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; }

  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  /* ─── SELECTABLE ACTION CARD ─────────────────────── */
  .action-card {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
  }

  .action-card:hover { border-color: var(--border2); background: var(--surface3); }
  .action-card.selected { border-color: var(--accent); background: rgba(59,130,246,0.1); }
  .action-card.disabled-card { opacity: .4; cursor: not-allowed; }

  /* ─── PROGRESS BARS ──────────────────────────────── */
  .progress-track {
    background: var(--surface3);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 1s cubic-bezier(.4,0,.2,1);
  }

  .progress-accent { background: linear-gradient(90deg, var(--accent), var(--cyan)); }
  .progress-emerald { background: linear-gradient(90deg, var(--emerald), #34d399); }
  .progress-amber { background: linear-gradient(90deg, var(--amber), #fbbf24); }
  .progress-rose { background: linear-gradient(90deg, var(--rose), #fb7185); }
  .progress-violet { background: linear-gradient(90deg, var(--violet), #a78bfa); }

  /* ─── CHOICE BUTTONS (negotiation/CEO) ───────────── */
  .choice-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    transition: all .18s;
    line-height: 1.5;
  }
  .choice-btn:hover { border-color: var(--accent); background: rgba(59,130,246,0.08); }
  .choice-btn.chosen-good { border-color: var(--emerald); background: rgba(16,185,129,0.1); }
  .choice-btn.chosen-bad { border-color: var(--rose); background: rgba(244,63,94,0.1); }
  .choice-btn.chosen-neutral { border-color: var(--amber); background: rgba(245,158,11,0.1); }

  /* ─── BADGE ──────────────────────────────────────── */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .04em;
  }

  .badge-rose { background: rgba(244,63,94,0.15); color: var(--rose); }
  .badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-emerald { background: rgba(16,185,129,0.15); color: var(--emerald); }
  .badge-accent { background: rgba(59,130,246,0.15); color: var(--accent2); }
  .badge-violet { background: rgba(139,92,246,0.15); color: var(--violet); }

  /* ─── MISC HELPERS ───────────────────────────────── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .chip {
    display: inline-block;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
  }

  .icon-circle {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }

  .mb4 { margin-bottom: 4px; }
  .mb8 { margin-bottom: 8px; }
  .mb12 { margin-bottom: 12px; }
  .mb16 { margin-bottom: 16px; }
  .mb24 { margin-bottom: 24px; }
  .mb32 { margin-bottom: 32px; }
  .mt8 { margin-top: 8px; }
  .mt12 { margin-top: 12px; }
  .mt16 { margin-top: 16px; }
  .mt24 { margin-top: 24px; }
  .mt32 { margin-top: 32px; }

  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .items-center { align-items: center; }
  .items-start { align-items: flex-start; }
  .justify-between { justify-content: space-between; }
  .justify-center { justify-content: center; }
  .gap4 { gap: 4px; }
  .gap8 { gap: 8px; }
  .gap12 { gap: 12px; }
  .gap16 { gap: 16px; }
  .gap24 { gap: 24px; }
  .flex-1 { flex: 1; }
  .text-sm { font-size: 13px; }
  .text-xs { font-size: 11px; }
  .text-muted { color: var(--muted); }
  .text-dim { color: var(--dim); }
  .text-amber { color: var(--amber); }
  .text-rose { color: var(--rose); }
  .text-emerald { color: var(--emerald); }
  .text-accent { color: var(--accent2); }
  .text-violet { color: var(--violet); }
  .font-600 { font-weight: 600; }
  .font-500 { font-weight: 500; }
  .w-full { width: 100%; }
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .relative { position: relative; }

  /* ─── ANIMATIONS ─────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .fade-up { animation: fadeUp .4s ease both; }
  .fade-up-2 { animation: fadeUp .4s .1s ease both; }
  .fade-up-3 { animation: fadeUp .4s .2s ease both; }
  .fade-up-4 { animation: fadeUp .4s .3s ease both; }

  .pulse { animation: pulse 2s infinite; }

  .spin { animation: spin 1s linear infinite; display: inline-block; }

  /* ─── SECTION HEADER ─────────────────────────────── */
  .section-header {
    padding: 16px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .step-pill {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    display: inline-block;
    margin-bottom: 8px;
    letter-spacing: .06em;
  }

  /* ─── SCORE RING ─────────────────────────────────── */
  .score-ring-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 8px;
  }

  .score-ring {
    width: 120px; height: 120px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 4px solid transparent;
    position: relative;
  }

  /* ─── FINAL DASHBOARD ────────────────────────────── */
  .score-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }

  .score-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }

  .ai-invest-card {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
  }
  .ai-invest-card:hover { border-color: var(--violet); background: rgba(139,92,246,0.06); }
  .ai-invest-card.selected { border-color: var(--violet); background: rgba(139,92,246,0.12); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* Tooltip-style explain box */
  .explain-box {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.55;
  }
  .explain-box strong { color: var(--text); }

  /* Consequence row */
  .consequence-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .consequence-row:last-child { border-bottom: none; }

  /* Negotiation round */
  .neg-round {
    background: var(--surface2);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .card { padding: 14px 16px; }
    .display { font-size: clamp(24px, 7vw, 48px) !important; }
    .card-grid { grid-template-columns: 1fr 1fr; }
    .score-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

// ─── METRIC COLORS ──────────────────────────────────
const metricColor = v => v >= 65 ? 'emerald' : v >= 40 ? 'amber' : 'rose';

// ─── PROGRESS BAR ───────────────────────────────────
function ProgressBar({ value, color = 'accent', animate = true }) {
  const [display, setDisplay] = useState(animate ? 0 : value);
  useEffect(() => {
    if (!animate) { setDisplay(value); return; }
    const t = setTimeout(() => setDisplay(value), 100);
    return () => clearTimeout(t);
  }, [value, animate]);

  return (
    <div className="progress-track">
      <div className={`progress-fill progress-${color}`} style={{ width: `${Math.max(0, Math.min(100, display))}%` }} />
    </div>
  );
}

// ─── METRIC ROW ─────────────────────────────────────
function MetricRow({ label, value, color, icon }) {
  const c = color || metricColor(value);
  return (
    <div className="consequence-row">
      <span style={{ fontSize: 18 }}>{icon}</span>
      <div className="flex-1">
        <div className="flex justify-between mb4">
          <span className="text-sm font-500">{label}</span>
          <span className={`mono text-sm text-${c}`}>{value}%</span>
        </div>
        <ProgressBar value={value} color={c} />
      </div>
    </div>
  );
}

// ─── STEP INDICATOR ─────────────────────────────────
function StepIndicator({ current, total }) {
  return (
    <div className="flex items-center gap4 mb16" style={{ flexWrap: 'wrap' }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          width: i < current ? 28 : 8, height: 4, borderRadius: 999,
          background: i < current ? 'var(--accent)' : i === current ? 'var(--muted)' : 'var(--border)',
          transition: 'all .3s',
          flexShrink: 0
        }} />
      ))}
      <span className="text-xs text-muted" style={{ marginLeft: 4 }}>Step {current + 1} of {total}</span>
    </div>
  );
}

function WarRoomScreen({ onNext }) {
  const [selected, setSelected] = useState([]);
  const [simulated, setSimulated] = useState(false);
  const [metrics, setMetrics] = useState({ cost: 60, inventory: 55, profit: 60, delivery: 50, satisfaction: 65 });

  const toggle = id => {
    if (simulated) return;
    setSelected(prev =>
      prev.includes(id) ? prev.filter(x => x !== id) : prev.length < 3 ? [...prev, id] : prev
    );
  };

  const simulate = () => {
    const chosen = WAR_ROOM_ACTIONS.filter(a => selected.includes(a.id));
    let m = { cost: 60, inventory: 55, profit: 60, delivery: 50, satisfaction: 65 };
    chosen.forEach(a => {
      m.cost = Math.min(100, Math.max(0, m.cost + a.effects.cost));
      m.inventory = Math.min(100, Math.max(0, m.inventory + a.effects.inventory));
      m.profit = Math.min(100, Math.max(0, m.profit + a.effects.profit));
      m.delivery = Math.min(100, Math.max(0, m.delivery + a.effects.delivery));
      m.satisfaction = Math.min(100, Math.max(0, m.satisfaction + a.effects.satisfaction));
    });
    setMetrics(m);
    setSimulated(true);
  };

  const ICONS = { cost: '💸', inventory: '📦', profit: '📈', delivery: '🚚', satisfaction: '⭐' };
  const LABELS = { cost: 'Cost Control', inventory: 'Inventory Level', profit: 'Profit Margin', delivery: 'Delivery Speed', satisfaction: 'Customer Satisfaction' };

  return (
    <div className="screen">
      <StepIndicator current={2} total={8} />

        <div className="step-pill">WAR ROOM</div>
        <h2 className="display" style={{ fontSize: 28 }}>Choose Your Response</h2>
      </div>

      <div className="explain-box fade-up mb24">
        <strong>Pick 3 response actions.</strong> Every action has trade-offs — there is no perfect combination. Higher delivery speed might cost more. Saving cash might hurt customer satisfaction. Think like a VP: what are your top priorities right now?
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 12, marginBottom: 24 }}>
        {WAR_ROOM_ACTIONS.map(action => {
          const isSel = selected.includes(action.id);
          const isDisabled = !isSel && selected.length >= 3 && !simulated;
          return (
            <div
              key={action.id}
              className={`action-card fade-up ${isSel ? 'selected' : ''} ${isDisabled ? 'disabled-card' : ''}`}
              onClick={() => toggle(action.id)}
            >
              <div className="flex items-center gap8 mb8">
                <span style={{ fontSize: 20 }}>{action.emoji}</span>
                <span style={{ fontWeight: 600, fontSize: 14 }}>{action.title}</span>

              <p className="text-sm text-muted mb8">{action.description}</p>
              <p className="text-xs" style={{ color: 'var(--dim)', fontStyle: 'italic' }}>💡 {action.why}</p>
            </div>
          );
        })}
      </div>

      <div className="flex items-center justify-between mb16" style={{ flexWrap: 'wrap', gap: 8 }}>
        <p className="text-sm text-muted">{selected.length}/3 actions selected</p>
        {selected.length === 3 && !simulated && (
          <button className="btn btn-amber" onClick={simulate}>Simulate Consequences ⚡</button>
        )}

      {simulated && (
        <div className="card card-glow fade-up mb24">

// SCREEN 5: NEGOTIATION
// ═══════════════════════════════════════════════════════
function NegotiationScreen({ onNext }) {
  const [round, setRound] = useState(0);
  const [chosen, setChosen] = useState([]);
  const [scores, setScores] = useState({ trust: 50, price: 50, lead: 50 });
  const [pendingChoice, setPendingChoice] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);
  const [done, setDone] = useState(false);

  const pick_choice = choice => {
    setPendingChoice(choice);
    setShowFeedback(true);
    setScores(prev => ({
      trust: Math.min(100, Math.max(0, prev.trust + choice.trust)),
      price: Math.min(100, Math.max(0, prev.price + choice.price)),
      lead: Math.min(100, Math.max(0, prev.lead + choice.lead)),
    }));
    setChosen(prev => [...prev, choice]);
  };

  const nextRound = () => {
    setShowFeedback(false);
    setPendingChoice(null);
    if (round + 1 >= NEG_ROUNDS.length) {
      setDone(true);
    } else {
      setRound(r => r + 1);
    }
  };

  const negScore = Math.round((scores.trust + scores.price + scores.lead) / 3);
  const current = NEG_ROUNDS[round];

  const qualityClass = q => q === 'good' ? 'chosen-good' : q === 'bad' ? 'chosen-bad' : 'chosen-neutral';

  return (
    <div className="screen">
      <StepIndicator current={3} total={8} />
      <div className="section-header fade-up">
        <div className="step-pill">NEGOTIATION</div>
        <h2 className="display" style={{ fontSize: 28 }}>Supplier Negotiation</h2>
      </div>

      <div className="card fade-up mb20">
        <p className="label mb12">Live Negotiation Metrics</p>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
          {[
            { label: 'Trust Level', v: scores.trust, color: 'emerald', icon: '🤝' },
            { label: 'Price Position', v: scores.price, color: 'amber', icon: '💰' },
            { label: 'Lead Time', v: scores.lead, color: 'accent', icon: '⏱️' },
          ].map(({ label, v, color, icon }) => (
            <div key={label} className="stat-card text-center">
              <p className="text-xs text-muted mb4">{icon} {label}</p>
              <p className={`value-large text-${color}`}>{v}</p>
            </div>
          ))}
        </div>
      </div>

      {!done ? (
        <div className="fade-up">
          <div className="neg-round card-glow card mb20">
            <div className="flex items-center gap8 mb12">
              <span className="badge badge-accent">Round {round + 1} of {NEG_ROUNDS.length}</span>
            </div>
            <h3 style={{ fontWeight: 600, marginBottom: 12, lineHeight: 1.5 }}>{current.situation}</h3>
            <div className="explain-box" style={{ marginBottom: 16 }}>
              <strong>Why this matters:</strong> {current.why}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {current.choices.map((c, i) => {
                const isChosen = showFeedback && pendingChoice === c;
                return (
                  <button
                    key={i}
                    className={`choice-btn ${isChosen ? qualityClass(c.quality) : ''}`}
                    onClick={() => !showFeedback && pick_choice(c)}
                    disabled={showFeedback && pendingChoice !== c}
                    style={{ opacity: showFeedback && pendingChoice !== c ? 0.4 : 1 }}
                  >
                    <div className="flex items-start justify-between gap8">
                      <span>{c.text}</span>
                      {isChosen && <span className="badge badge-emerald" style={{ flexShrink: 0 }}>{c.label}</span>}
                    </div>
                    {isChosen && <p className="text-xs text-muted mt8">{c.feedback}</p>}
                  </button>
                );
              })}
            </div>
          </div>
          {showFeedback && (
            <button className="btn btn-primary w-full fade-up" onClick={nextRound}>
              {round + 1 < NEG_ROUNDS.length ? `Continue to Round ${round + 2} →` : 'See Negotiation Score →'}
            </button>
          )}
        </div>
      ) : (
        <div className="fade-up">
          <div className="card card-emerald mb24">
            <div className="text-center mb20">
              <p className="label mb8">Negotiation Complete</p>
              <p className="display text-emerald" style={{ fontSize: 48 }}>{negScore}</p>
              <p className="text-sm text-muted mt4">Overall Negotiation Score / 100</p>
            </div>
            <hr className="divider" />
            <p className="label mb12">Round Recap</p>
            {chosen.map((c, i) => (
              <div key={i} className="flex items-start gap8 mb10 text-sm">
                <span className={`badge badge-${c.quality === 'good' ? 'emerald' : c.quality === 'bad' ? 'rose' : 'amber'}`}>R{i + 1}</span>
                <div>
                  <span className="font-600">{c.label}:</span> {c.feedback}
                </div>
              </div>
            ))}
          </div>
          <button className="btn btn-primary w-full" onClick={() => onNext(negScore, scores)}>
            Enter the CEO Boardroom →
          </button>
        </div>
      )}
    </div>
  );
}

function FinalScreen({ data, company, crisis, onReplay }) {
  const { warMetrics, warActions, negScore, negScores, leadershipScore, aiInvestments } = data;

  // Compute sub-scores
  const resilienceBase = Math.round((warMetrics.inventory + warMetrics.delivery) / 2);
  const resilienceBonus = aiInvestments.includes('risk') ? 10 : aiInvestments.includes('inventory') ? 6 : 0;
  const resilience = Math.min(100, resilienceBase + resilienceBonus);

  const costControl = warMetrics.cost;
  const riskMgmt = Math.round((negScores.trust + (aiInvestments.includes('risk') ? 85 : 55)) / 2);
  const custSatisfaction = Math.round((warMetrics.satisfaction + negScore) / 2);
  const overallScore = Math.round((leadershipScore + negScore + resilience + costControl + Math.min(100, riskMgmt) + custSatisfaction) / 6);

  const scoreColor = s => s >= 70 ? 'emerald' : s >= 45 ? 'amber' : 'rose';
  const grade = s => s >= 85 ? 'A' : s >= 70 ? 'B' : s >= 55 ? 'C' : s >= 40 ? 'D' : 'F';
  const gradeLabel = s => s >= 85 ? 'Exceptional' : s >= 70 ? 'Proficient' : s >= 55 ? 'Developing' : s >= 40 ? 'At Risk' : 'Crisis Mode';

  // Best/worst action analysis
  const chosenActions = WAR_ROOM_ACTIONS.filter(a => warActions.includes(a.id));
  const bestAction = chosenActions.sort((a, b) => (b.effects.satisfaction + b.effects.delivery) - (a.effects.satisfaction + a.effects.delivery))[0];
  const worstAction = chosenActions.sort((a, b) => (a.effects.cost + a.effects.profit) - (b.effects.cost + b.effects.profit))[0];

  const aiNames = aiInvestments.map(id => AI_INVESTMENTS.find(a => a.id === id)?.name).join(' + ');

  const feedback = overallScore >= 75
    ? 'You navigated this crisis with strategic clarity. Your decisions showed systems thinking — balancing short-term triage with long-term relationship building. Most executives would be satisfied with this outcome.'
    : overallScore >= 55
    ? 'A solid performance under pressure. You made some excellent calls but left room on the table in a few key moments. With refinement, these instincts could become reliable crisis leadership.'
    : 'This was a difficult crisis and the learning curve was steep. The good news: the executives who handle the next crisis best are usually the ones who struggled in their first simulation. Review the lessons carefully.';

  const lessons = [
    'Dual sourcing isn\'t a luxury — it\'s the minimum standard for any critical component.',
    'The first 24 hours of a supply chain crisis determine 70% of the outcome.',
    'Customer communication during a crisis is as important as operations.',
    'AI tools are most valuable when they\'re running before the crisis, not after.',
    'Negotiation is relationship management, not just price management.',
  ];

  return (
    <div className="screen">
      <div className="section-header fade-up">
        <div className="step-pill">FINAL REPORT</div>
        <h2 className="display" style={{ fontSize: 28 }}>Crisis Performance Dashboard</h2>
        <p className="text-sm text-muted mt4">{company.name} • {crisis.name} • {new Date().toLocaleDateString()}</p>
      </div>

      {/* Overall Score */}
      <div className="card card-glow fade-up mb24" style={{ textAlign: 'center', padding: '32px 24px' }}>
        <p className="label mb16">OVERALL CRISIS SCORE</p>
        <div style={{
          width: 140, height: 140, borderRadius: '50%', margin: '0 auto 16px',
          background: `conic-gradient(var(--${scoreColor(overallScore)}) ${overallScore * 3.6}deg, var(--surface3) 0deg)`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: `0 0 40px rgba(16,185,129,0.2)`
        }}>
          <div style={{
            width: 108, height: 108, borderRadius: '50%',
            background: 'var(--surface)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center'
          }}>
            <span className={`display text-${scoreColor(overallScore)}`} style={{ fontSize: 36, lineHeight: 1 }}>{overallScore}</span>
            <span className="text-xs text-muted">/100</span>
          </div>
        </div>
        <p className={`display text-${scoreColor(overallScore)}`} style={{ fontSize: 22 }}>{grade(overallScore)} — {gradeLabel(overallScore)}</p>
      </div>

      {/* Sub-scores */}
      <div className="score-grid fade-up-2 mb24">
        {[
          { label: 'Leadership', v: leadershipScore, icon: '👔' },
          { label: 'Negotiation', v: negScore, icon: '🤝' },
          { label: 'Resilience', v: resilience, icon: '🛡️' },
          { label: 'Cost Control', v: costControl, icon: '💸' },
          { label: 'Risk Mgmt', v: Math.min(100, riskMgmt), icon: '⚠️' },
          { label: 'Cust. Satisfaction', v: custSatisfaction, icon: '⭐' },
        ].map(({ label, v, icon }) => (
          <div key={label} className="score-item">
            <p className="text-lg mb4" style={{ fontSize: 22 }}>{icon}</p>
            <p className={`value-large text-${scoreColor(v)}`}>{v}</p>
            <p className="text-xs text-muted mt4">{label}</p>
            <div className="mt8"><ProgressBar value={v} color={scoreColor(v)} /></div>
          </div>
        ))}
      </div>

      {/* Personalized feedback */}
      <div className="card fade-up-3 mb16">
        <p className="label mb12">🧠 Expert Assessment</p>
        <p className="text-sm" style={{ lineHeight: 1.7, marginBottom: 16 }}>{feedback}</p>
        <hr className="divider" />
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
          <div>
            <p className="label mb8 text-emerald">✅ Best Decision</p>
            <p className="text-sm text-muted">{bestAction?.title} — you prioritized customer experience and speed when it mattered most.</p>
          </div>
          <div>
            <p className="label mb8 text-amber">⚠️ Biggest Cost Trade-off</p>
            <p className="text-sm text-muted">{worstAction?.title} — this choice had the highest cost impact. Worth reviewing the trade-off logic.</p>
          </div>
        </div>
      </div>

      <div className="card fade-up-3 mb16">
        <p className="label mb12">🤖 AI Investment Preview</p>
        <p className="text-sm text-muted mb12">You invested in: <span className="text-violet font-600">{aiNames}</span></p>
        <p className="text-sm" style={{ lineHeight: 1.7 }}>
          With these tools in place, your risk exposure to a similar {crisis.name.toLowerCase()} would decrease by an estimated {rnd(30, 55)}%. 
          Supplier Risk Monitoring alone would have given you 72-hour advance warning — enough to pre-activate your backup supplier before the crisis hit.
        </p>
      </div>

      <div className="card fade-up-4 mb32">
        <p className="label mb12">📚 Lessons From This Crisis</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {lessons.map((l, i) => (
            <div key={i} className="flex items-start gap10 text-sm">
              <span className="badge badge-accent" style={{ flexShrink: 0, marginTop: 2 }}>{i + 1}</span>
              <span className="text-muted">{l}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="flex gap12" style={{ flexWrap: 'wrap' }}>
        <button className="btn btn-primary btn-large flex-1" onClick={onReplay} style={{ minWidth: 200 }}>
          🔄 Play Again (New Scenario)
        </button>
        <button className="btn btn-outline" onClick={() => window.print()}>
          🖨️ Print Report
        </button>
      </div>
    </div>
  );
}

function generateCompany() {
  const industry = pick(INDUSTRIES);
  const numCountries = rnd(3, 6);
  const shuffled = [...COUNTRIES].sort(() => Math.random() - .5).slice(0, numCountries);
  const inventoryDays = rnd(12, 60);
  const resilience = rnd(20, 75);
  return {
    name: pick(COMPANY_NAMES),
    industry,
    revenue: rnd(80, 2400),
    factories: rnd(2, 12),
    warehouses: rnd(3, 18),
    suppliers: rnd(8, 60),
    inventoryDays,
    leadTime: rnd(14, 65),
    countries: shuffled,
    founded: rnd(1965, 2015),
    health: resilience >= 60
      ? { label: 'Healthy', color: 'emerald', note: 'Your supply chain has solid fundamentals — but no chain is immune to a major disruption.' }
      : resilience >= 35
      ? { label: 'Moderate Risk', color: 'amber', note: 'Some vulnerabilities exist. A major disruption could expose gaps in resilience.' }
      : { label: 'High Risk', color: 'rose', note: 'Your supply chain has notable fragility. A crisis will hit harder and recover slower.' },
    healthScores: {
      resilience,
      diversity: rnd(20, 80),
      digital: rnd(15, 75),
    },
  };
}

function generateCrisis() {
  return { ...pick(CRISES) };
}

    setScreen('welcome');
    setCompany(null);
    setCrisis(null);
    setGameData({});

  return (
    <>

      {screen === 'company' && <CompanyScreen company={company} onNext={() => setScreen('crisis')} />}

      {screen === 'ceo' && (
        <CEOScreen
          onNext={leadershipScore => {
            setGameData(d => ({ ...d, leadershipScore }));
            setScreen('ai');
          }}
        />
      )}
      {screen === 'ai' && (
        <AIScreen
          onNext={aiInvestments => {
            setGameData(d => ({ ...d, aiInvestments }));
            setScreen('final');
          }}
        />
      )}
      {screen === 'final' && (
        <FinalScreen
          data={gameData}
          company={company}
          crisis={crisis}
          onReplay={replay}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
